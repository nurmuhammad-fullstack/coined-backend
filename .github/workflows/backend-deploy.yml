name: Backend CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: coined-backend-production
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run syntax checks
        run: npm run check

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create release archive
        run: |
          mkdir -p dist
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='uploads' \
            --exclude='.env' \
            --exclude='bot.log' \
            -czf "dist/release.tar.gz" .

      - name: Set up SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload release archive
        run: |
          ssh -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "mkdir -p /opt/coined/releases/${GITHUB_SHA}"
          scp -P "${{ secrets.VPS_PORT }}" dist/release.tar.gz \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/coined/releases/${GITHUB_SHA}/release.tar.gz"

      - name: Deploy on VPS
        run: |
          ssh -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "cd /opt/coined/releases/${GITHUB_SHA} && tar -xzf release.tar.gz && chmod +x scripts/deploy-release.sh && ./scripts/deploy-release.sh ${GITHUB_SHA}"
